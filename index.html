<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আসিফ আকবর মিউজিক স্টেশন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { background-color: #0b0f19; color: #f8fafc; font-family: 'Hind Siliguri', sans-serif; }
        .spotify-card { background: #181c2a; transition: 0.3s; border: 1px solid #2d3748; }
        .spotify-card:hover { background: #2d3748; transform: translateY(-5px); }
        .glass-player { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); border-top: 2px solid #3b82f6; }
        .loader { border: 4px solid #1e293b; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32">

    <!-- Header & Search -->
    <header class="p-6 sticky top-0 z-50 bg-[#0b0f19] shadow-2xl">
        <div class="container mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <h1 class="text-3xl font-black text-blue-500 tracking-tighter cursor-pointer" onclick="location.reload()">ASIF <span class="text-white">MUSIC</span></h1>
            <div class="relative w-full md:w-1/2">
                <input type="text" id="searchInput" onkeyup="if(event.key === 'Enter') searchMusic()" 
                       placeholder="অন্য শিল্পীর গান খুঁজুন (যেমন: James, Tahsan)..." 
                       class="w-full bg-[#1e293b] text-white rounded-full py-3 px-6 pl-12 focus:outline-none focus:ring-2 focus:ring-blue-500 border border-slate-700">
                <i class="fas fa-search absolute left-5 top-4 text-slate-400"></i>
            </div>
        </div>
    </header>

    <!-- Hero Section (Asif Akbar Profile) -->
    <div id="hero" class="container mx-auto px-6 py-10 flex flex-col md:flex-row items-center gap-10 bg-gradient-to-b from-blue-900/20 to-transparent rounded-3xl mb-10">
        <img id="artistImg" src="https://c.saavncdn.com/artists/Asif_Akbar_500x500.jpg" class="w-56 h-56 rounded-full border-8 border-[#1e293b] shadow-2xl object-cover">
        <div class="text-center md:text-left">
            <h2 id="artistName" class="text-5xl md:text-7xl font-bold mb-4">আসিফ আকবর</h2>
            <p class="text-slate-400 text-lg max-w-xl">বাংলা গানের কিংবদন্তি এবং আসিফিয়ানদের প্রিয় শিল্পীর সব সুপারহিট গানের কালেকশন এখানে।</p>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto px-6">
        <div id="loading" class="hidden flex justify-center my-20">
            <div class="loader"></div>
        </div>

        <div id="songGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- গানের লিস্ট এখানে আসবে -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="container mx-auto px-6 mt-20 pb-10 border-t border-slate-800 pt-10 text-center text-slate-500">
        <p class="mb-4">আসিফ আকবর মিউজিক কালেকশন - বিনোদনের জন্য তৈরি</p>
        <div class="flex justify-center gap-6 text-2xl">
            <i class="fab fa-youtube hover:text-red-500 cursor-pointer"></i>
            <i class="fab fa-facebook hover:text-blue-600 cursor-pointer"></i>
            <i class="fab fa-spotify hover:text-green-500 cursor-pointer"></i>
        </div>
    </footer>

    <!-- Bottom Player -->
    <div id="player" class="fixed bottom-0 left-0 right-0 glass-player p-4 transform translate-y-full transition-transform duration-500">
        <div class="container mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center gap-4 w-1/3">
                <img id="currentThumb" src="" class="w-12 h-12 rounded shadow-lg">
                <div class="overflow-hidden">
                    <h4 id="currentTitle" class="font-bold truncate text-sm md:text-base">গানের নাম</h4>
                    <p id="currentArtist" class="text-xs text-slate-400 truncate">শিল্পী</p>
                </div>
            </div>
            <div class="w-full md:w-1/2">
                <audio id="audioElement" controls class="w-full h-10"></audio>
            </div>
        </div>
    </div>

    <script>
        // সাভন এপিআই এর পাবলিক ইউআরএল
        const API_BASE = "https://saavn.dev/api";

        // পেজ লোড হলে আসিফ আকবরের গান দেখাবে
        window.onload = () => {
            fetchSongs("Asif Akbar");
        };

        // সার্চ ফাংশন
        function searchMusic() {
            const query = document.getElementById('searchInput').value;
            if (query) {
                fetchSongs(query);
            }
        }

        async function fetchSongs(query) {
            const grid = document.getElementById('songGrid');
            const loader = document.getElementById('loading');
            const hero = document.getElementById('hero');

            grid.innerHTML = "";
            loader.classList.remove('hidden');

            try {
                // সরাসরি গান সার্চ করার API
                const response = await fetch(`${API_BASE}/search/songs?query=${encodeURIComponent(query)}&limit=30`);
                const result = await response.json();
                const songs = result.data.results;

                if (songs.length > 0) {
                    // প্রথম গানের শিল্পী অনুযায়ী হিরো সেকশন আপডেট
                    document.getElementById('artistName').innerText = query;
                    document.getElementById('artistImg').src = songs[0].image[2].link;

                    songs.forEach(song => {
                        // উচ্চ মানের গানের লিঙ্ক (320kbps)
                        const playUrl = song.downloadUrl[song.downloadUrl.length - 1].link;
                        const card = `
                            <div class="spotify-card p-4 rounded-2xl flex items-center gap-4 cursor-pointer" 
                                 onclick="playSong('${song.name.replace(/'/g, "")}', '${song.primaryArtists}', '${playUrl}', '${song.image[2].link}')">
                                <img src="${song.image[1].link}" class="w-20 h-20 rounded-lg object-cover">
                                <div class="overflow-hidden">
                                    <h3 class="font-bold truncate text-lg">${song.name}</h3>
                                    <p class="text-sm text-slate-400 truncate">${song.primaryArtists}</p>
                                    <div class="mt-2 text-blue-500 text-xs font-bold uppercase tracking-wider">
                                        <i class="fas fa-play-circle mr-1"></i> প্লে করুন
                                    </div>
                                </div>
                            </div>
                        `;
                        grid.innerHTML += card;
                    });
                } else {
                    grid.innerHTML = "<p class='col-span-full text-center py-10'>দুঃখিত, কোনো গান পাওয়া যায়নি!</p>";
                }
            } catch (error) {
                console.error("API Error:", error);
                grid.innerHTML = "<p class='col-span-full text-center py-10 text-red-400'>গান লোড করতে সমস্যা হচ্ছে। অনুগ্রহ করে ইন্টারনেট কানেকশন চেক করুন।</p>";
            } finally {
                loader.classList.add('hidden');
            }
        }

        function playSong(title, artist, url, thumb) {
            const player = document.getElementById('player');
            const audio = document.getElementById('audioElement');

            player.classList.remove('translate-y-full');
            document.getElementById('currentTitle').innerText = title;
            document.getElementById('currentArtist').innerText = artist;
            document.getElementById('currentThumb').src = thumb;

            audio.src = url;
            audio.play();
        }
    </script>
</body>
</html>
