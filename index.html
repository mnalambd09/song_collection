<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সুর লহরী V2 - বাংলা গান</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Hind Siliguri', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .song-card:hover { background: rgba(59, 130, 246, 0.1); transition: 0.3s; }
    </style>
</head>
<body class="pb-32">

    <!-- Navbar -->
    <nav class="p-4 sticky top-0 z-50 glass shadow-xl">
        <div class="container mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <h1 class="text-2xl font-bold text-blue-500 cursor-pointer" onclick="window.location.reload()">সুর লহরী</h1>
            <div class="relative w-full md:w-1/2">
                <input type="text" id="searchInput" placeholder="গান বা শিল্পীর নাম লিখে এন্টার দিন..." 
                    class="w-full bg-slate-900 border border-slate-700 rounded-full py-2 px-5 outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="searchMusic()" class="absolute right-4 top-2.5 text-blue-500"><i class="fas fa-search"></i></button>
            </div>
        </div>
    </nav>

    <!-- Loading Spinner -->
    <div id="loading" class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 z-50">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
    </div>

    <main class="container mx-auto px-4 mt-8">
        <!-- Popular Artists Section -->
        <div id="artistHome">
            <h2 class="text-xl font-bold mb-6 text-slate-300">জনপ্রিয় শিল্পী</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4" id="artistGrid">
                <!-- Artists inserted by JS -->
            </div>
        </div>

        <!-- Song List Section -->
        <div id="songContainer" class="hidden">
            <button onclick="goBack()" class="mb-5 text-blue-400 flex items-center gap-2"><i class="fas fa-arrow-left"></i> ফিরে যান</button>
            <div id="listHeader" class="mb-8 flex flex-col md:flex-row gap-6 items-center glass p-6 rounded-2xl"></div>
            <div class="grid gap-2" id="songList"></div>
        </div>
    </main>

    <!-- Player Bar -->
    <div id="playerBar" class="fixed bottom-0 left-0 right-0 glass border-t border-slate-700 p-4 translate-y-full transition-transform duration-500">
        <div class="container mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3 w-1/3">
                <img id="pImg" src="" class="w-12 h-12 rounded shadow-md">
                <div class="overflow-hidden">
                    <p id="pTitle" class="font-bold truncate text-sm"></p>
                    <p id="pArtist" class="text-xs text-slate-400 truncate"></p>
                </div>
            </div>
            <div class="flex-grow flex justify-center">
                <audio id="mainAudio" controls class="w-full max-w-lg h-10"></audio>
            </div>
        </div>
    </div>

    <script>
        // একাধিক API ব্যাকআপ হিসেবে রাখা হয়েছে
        const API_URL = "https://saavn.dev/api"; 

        const artists = [
            { name: "জেমস", id: "468352", img: "https://c.saavncdn.com/artists/James_004_20191111082502_500x500.jpg" },
            { name: "আইয়ুব বাচ্চু", id: "468354", img: "https://c.saavncdn.com/artists/Ayub_Bachchu_500x500.jpg" },
            { name: "তাহসান", id: "468245", img: "https://c.saavncdn.com/artists/Tahsan_500x500.jpg" },
            { name: "হাবিব ওয়াহিদ", id: "468190", img: "https://c.saavncdn.com/artists/Habib_Wahid_500x500.jpg" },
            { name: "মিনার রহমান", id: "468378", img: "https://c.saavncdn.com/artists/Minar_Rahman_500x500.jpg" },
            { name: "ইমরান", id: "468192", img: "https://c.saavncdn.com/artists/Imran_500x500.jpg" }
        ];

        // শুরুতে শিল্পী দেখানো
        function init() {
            const grid = document.getElementById('artistGrid');
            artists.forEach(a => {
                grid.innerHTML += `
                    <div class="glass p-4 rounded-xl text-center cursor-pointer hover:scale-105 transition shadow-lg" onclick="getArtistSongs('${a.id}')">
                        <img src="${a.img}" class="w-24 h-24 rounded-full mx-auto mb-3 object-cover border-2 border-blue-500">
                        <h3 class="font-bold text-sm">${a.name}</h3>
                    </div>
                `;
            });
        }

        // সার্চ ফাংশন
        async function searchMusic() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;

            toggleLoader(true);
            try {
                // API-র নতুন ভার্সনে /search/songs?query= ব্যবহার হয়
                const res = await fetch(`${API_URL}/search/songs?query=${encodeURIComponent(query)}`);
                const json = await res.json();
                const songs = json.data.results;
                renderSongs("সার্চ রেজাল্ট", null, songs);
            } catch (err) {
                alert("সার্চ করতে সমস্যা হচ্ছে। আবার চেষ্টা করুন।");
                console.error(err);
            }
            toggleLoader(false);
        }

        // শিল্পীর গান আনা
        async function getArtistSongs(id) {
            toggleLoader(true);
            try {
                const res = await fetch(`${API_URL}/artists?id=${id}`);
                const json = await res.json();
                renderSongs(json.data.name, json.data.image[2].link, json.data.topSongs);
            } catch (err) {
                alert("শিল্পী লোড করা যাচ্ছে না।");
            }
            toggleLoader(false);
        }

        // গানগুলো লিস্ট আকারে দেখানো
        function renderSongs(title, img, songs) {
            document.getElementById('artistHome').classList.add('hidden');
            document.getElementById('songContainer').classList.remove('hidden');

            const header = document.getElementById('listHeader');
            header.innerHTML = img ? `
                <img src="${img}" class="w-32 h-32 rounded-xl shadow-lg">
                <div class="text-center md:text-left">
                    <h2 class="text-3xl font-bold">${title}</h2>
                    <p class="text-blue-400">টপ হিট গানগুলো</p>
                </div>
            ` : `<h2 class="text-2xl font-bold">${title}</h2>`;

            const list = document.getElementById('songList');
            list.innerHTML = "";

            if (!songs || songs.length === 0) {
                list.innerHTML = "<p class='text-center p-10'>কোনো গান পাওয়া যায়নি।</p>";
                return;
            }

            songs.forEach(song => {
                // গানের কোয়ালিটি অনুযায়ী ডাউনলোড লিঙ্ক ঠিক করা
                const downloadUrl = song.downloadUrl[song.downloadUrl.length - 1].link; 
                const songTitle = song.name.replace(/'/g, "");
                const artistName = (song.primaryArtists || "Unknown").replace(/'/g, "");

                list.innerHTML += `
                    <div class="song-card p-3 flex items-center justify-between border-b border-slate-800 cursor-pointer" 
                        onclick="play('${songTitle}', '${artistName}', '${downloadUrl}', '${song.image[1].link}')">
                        <div class="flex items-center gap-4">
                            <img src="${song.image[0].link}" class="w-10 h-10 rounded">
                            <div>
                                <h4 class="text-sm font-semibold">${song.name}</h4>
                                <p class="text-xs text-slate-500">${song.primaryArtists}</p>
                            </div>
                        </div>
                        <i class="fas fa-play text-blue-500"></i>
                    </div>
                `;
            });
        }

        // গান প্লে করা
        function play(title, artist, url, img) {
            const bar = document.getElementById('playerBar');
            const audio = document.getElementById('mainAudio');
            
            bar.classList.remove('translate-y-full');
            document.getElementById('pTitle').innerText = title;
            document.getElementById('pArtist').innerText = artist;
            document.getElementById('pImg').src = img;
            
            audio.src = url;
            audio.play();
        }

        function goBack() {
            document.getElementById('artistHome').classList.remove('hidden');
            document.getElementById('songContainer').classList.add('hidden');
        }

        function toggleLoader(show) {
            document.getElementById('loading').classList.toggle('hidden', !show);
        }

        // এন্টার চাপলে সার্চ শুরু হবে
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchMusic();
        });

        init();
    </script>
</body>
</html>
